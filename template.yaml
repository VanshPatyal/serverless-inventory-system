AWSTemplateFormatVersion: '2010-09-09'
Description: 'Serverless Inventory Processing System'

Parameters:
  InventoryTableName:
    Type: String
    Default: inventory
    Description: Name for DynamoDB inventory table

Resources:
  # S3 Bucket for inventory CSV uploads
  InventoryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-inventory-${AWS::AccountId}'
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt InventoryProcessor.Arn

  # DynamoDB Table for inventory data
  InventoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref InventoryTableName
      AttributeDefinitions:
        - AttributeName: product_id
          AttributeType: S
      KeySchema:
        - AttributeName: product_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # Lambda Function
  InventoryProcessor:
    Type: AWS::Lambda::Function
    Properties:
      Handler: process_inventory.lambda_handler
      Runtime: python3.9
      Code: ./lambda
      Environment:
        Variables:
          INVENTORY_TABLE: !Ref InventoryTableName
          SNS_TOPIC_ARN: !Ref LowStockTopic
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 256

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: InventoryAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt InventoryTable.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub '${InventoryBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref LowStockTopic

  # SNS Topic for low stock alerts
  LowStockTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${AWS::StackName}-low-stock'

  # S3 Bucket Permission for Lambda
  S3InvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref InventoryProcessor
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt InventoryBucket.Arn

Outputs:
  BucketName:
    Description: S3 Bucket for inventory uploads
    Value: !Ref InventoryBucket
  InventoryTable:
    Description: DynamoDB Inventory Table
    Value: !Ref InventoryTable
  SnsTopicArn:
    Description: SNS Topic for low stock alerts
    Value: !Ref LowStockTopic
  LambdaFunction:
    Description: Lambda Function Name
    Value: !Ref InventoryProcessor
